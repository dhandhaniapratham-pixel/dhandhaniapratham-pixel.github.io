<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 2026: The Paddock</title>
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="shortcut icon" href="favicon/favicon.ico">
  
  <link rel="icon" type="image/png" sizes="192x192" href="favicon/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="favicon/android-chrome-512x512.png">
  
  <link rel="manifest" href="favicon/site.webmanifest">
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
  <input type="checkbox" id="sidebar-toggle" class="sidebar-toggle">

  <header class="header">
    <label for="sidebar-toggle" class="hamburger">
      <span></span><span></span><span></span>
    </label>
    <div class="logo">F1 <span>2026</span></div>
    <div class="top-controls">
      <button onclick="goBack()" class="control-btn">◀ Back</button>
      <button onclick="toggleDarkMode()" class="control-btn">🌗 Mode</button>
    </div>
  </header>

  <aside class="sidebar">
    <h3>Menu + F1 Related Links</h3>
    <ul>
      <li><a href="index.html">1. The Launchpad</a></li>
      <li><a href="evolution.html">2. Spec Sheet</a></li>
      <li><a href="paddock.html">3. The Paddock</a></li>
      
      <li style="margin-top: 2rem; border-top: 1px solid #333; padding-top: 1rem;">
        <a href="https://www.fia.com/" target="_blank">FIA Regulations ↗</a>
      </li>
      <li>
        <a href="https://www.formula1.com/" target="_blank">Formula1.com ↗</a>
      </li>
      <li style="margin-top: 2rem; border-top: 1px solid #333; padding-top: 1rem;">
        <a href="https://f1experiences.com/calendar-of-events" target="_blank">F1 Race Calender ↗</a>
      </li>
    </ul>
  </aside>

  <main class="main-content">
    <section id="paddock" class="page-section">
      <h2 style="text-align: center;">Interactive Fan Hub</h2>
      
      <img src="media/Mixed image.png" alt="F1 Cars" class="hero-banner levitate">
      
      <div class="grid-container">
        
        <div class="card">
          <h3>Setup Your 2026 Profile</h3>
          <form class="paddock-form">
            <div class="form-group">
              <label for="driverAlias">Enter Driver Alias:</label>
              <input type="text" id="driverAlias" placeholder="e.g., Pratham">
            </div>
            <div class="form-group">
              <label>Choose Power Unit:</label>
              <div class="radio-group">
                <label><input type="radio" name="powerUnit" value="Audi" checked> Audi</label>
                <label><input type="radio" name="powerUnit" value="Ford-Red Bull"> Ford</label>
                <label><input type="radio" name="powerUnit" value="Ferrari"> Ferrari</label>
              </div>
            </div>
            <button class="f1-btn" onclick="processProfile(event)">Generate Profile</button>
          </form>
          <div id="profileOutput" style="margin-top: 1rem; font-weight: bold; height: 25px;"></div>
        </div>

        <div class="card">
          <h3>Race Strategy Simulator</h3>
          <form class="paddock-form">
            <div class="form-group">
              <label for="tireType">Select Compound:</label>
              <select id="tireType">
                <option value="Soft">Soft (C5)</option>
                <option value="Medium">Medium (C3)</option>
                <option value="Hard">Hard (C1)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="fuelKg">Fuel Load (kg):</label>
              <input type="number" id="fuelKg" placeholder="Enter weight (e.g., 40)">
            </div>
            
            <div style="display: flex; gap: 1rem;">
              <button class="f1-btn" onclick="runStrategySim(event)">Run Sim</button>
              <button type="button" class="f1-btn" style="background-color: var(--secondary-accent); color: #000;" onclick="nextPhase()">Next: Track Day 🏁</button>
            </div>
          </form>
          <div id="simResult" style="margin-top: 1rem; font-weight: bold; height: 25px;"></div>
        </div>

      </div>
    </section>
  </main>

  <script src="JS/script.js"></script>
  <footer style="background-color: var(--card-bg); padding: 2rem; text-align: center; border-top: 2px solid var(--primary-accent);">
    <p style="color: var(--text-muted);">&copy; 2026 Pratham Dhandhania. All rights reserved. Built for the New Era.</p>
  </footer>
</body>
</html>
